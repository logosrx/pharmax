# Pharmax security CI — SAST, secret scanning, dependency review, SBOM.
#
# These gates supplement `ci.yml` with the security-specific checks
# SOC 2 CC7 + CC8 (system operations, change management) expect:
#
#   - `codeql`       — GitHub-native static analysis for JS/TS. Hard
#                      fails on `error`-level findings; warnings show
#                      up in the security tab.
#   - `gitleaks`     — secret scanning across the diff (PR) and the
#                      full history (push to main). MUST block: a
#                      leaked credential is a critical incident.
#   - `dependency-review` — diffs the lockfile against vuln advisories
#                           on every PR. Blocks high-severity new
#                           additions; warns on transitive.
#   - `sbom`         — produces an SPDX SBOM (Anchore syft) artefact
#                      attached to the workflow run. Used by SOC 2
#                      evidence collection to demonstrate continuous
#                      dependency visibility.
#
# Permissions: each job is granted the MINIMUM scope it needs. None
# of these jobs ever pushes to the repo.

name: security

on:
  pull_request:
  push:
    branches: [main]
  # Weekly run independent of code change — catches newly disclosed
  # CVEs against the current main without waiting for the next PR.
  schedule:
    - cron: "17 4 * * 1" # Mondays at 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.1.1"

jobs:
  codeql:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      # CodeQL writes findings to the Security tab via the code-scanning API.
      security-events: write
      # Required by the codeql-action for forked-PR analysis.
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-extended` includes the HIPAA-relevant queries:
          # broken auth, weak crypto, taint into PHI sinks.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `--log-opts` can scan the entire branch
          # on push events. PR events only scan the diff (fast).
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pinned config under .github/gitleaks.toml. The default
          # ruleset is comprehensive; we extend with Pharmax-specific
          # patterns (Clerk webhook secrets, EasyPost tokens).
          GITLEAKS_CONFIG: .github/gitleaks.toml
          # Run in "fail on finding" mode — a real secret in a PR is
          # a critical incident, not an advisory.
          GITLEAKS_ENABLE_SUMMARY: "true"

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only meaningful on pull_request — the action diffs base vs head.
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          # Block any new high-severity CVE introduced by this PR.
          # `moderate` and below are flagged but not blocking; they
          # produce annotations the reviewer can act on.
          fail-on-severity: high
          # Block license incompatibilities. The Pharmax product is
          # closed-source; we cannot accept new copyleft (GPL/AGPL)
          # transitive deps without an explicit security review.
          deny-licenses: "AGPL-1.0-only, AGPL-1.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later, GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later"
          # Allow specific PRs to opt out with an `allow-dependencies-licenses`
          # comment if a security review has cleared the addition.
          comment-summary-in-pr: on-failure

  sbom:
    name: SBOM (SPDX via syft)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
        env:
          CI: "true"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          # `pharmax.spdx.json` lands under workflow artefacts. The
          # SOC 2 evidence-collection script pulls these from the
          # last 90 days of `security` runs on `main`.
          output-file: "pharmax.spdx.json"
          # No upload to release assets — we keep SBOMs internal to
          # the GitHub run artefacts until we have an evidence bucket
          # provisioned (Tier 2 deliverable).
          upload-artifact: true
          upload-release-assets: false

  # Aggregate gate so branch protection can require a single job.
  security-pass:
    name: security-pass
    runs-on: ubuntu-latest
    needs: [codeql, gitleaks, dependency-review, sbom]
    if: always()
    steps:
      - name: All required security jobs succeeded
        # dependency-review is allowed to be skipped on push-to-main
        # (it's PR-only); the others must succeed.
        if: |
          contains(needs.codeql.result, 'failure') ||
          contains(needs.codeql.result, 'cancelled') ||
          contains(needs.gitleaks.result, 'failure') ||
          contains(needs.gitleaks.result, 'cancelled') ||
          contains(needs.sbom.result, 'failure') ||
          contains(needs.sbom.result, 'cancelled') ||
          (github.event_name == 'pull_request' && (contains(needs.dependency-review.result, 'failure') || contains(needs.dependency-review.result, 'cancelled')))
        run: |
          echo "::error::One or more required security jobs failed or were cancelled."
          exit 1
      - run: echo "All required security jobs passed."

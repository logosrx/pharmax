packages:
  - "apps/*"
  - "packages/*"

# Dependency version overrides. pnpm 10+/11 reads these from the workspace
# file (not package.json `pnpm.overrides`).
overrides:
  # GHSA-mw96-cpmx-2vgc: force the build-time rollup 3.x pulled transitively
  # by @sentry/nextjs to the patched >=3.30.0. Selected by resolved version so
  # the unrelated rollup 4.x (vite/vitest) is left untouched.
  "rollup@<3.30.0": "^3.30.0"

allowBuilds:
  esbuild: true
  "@prisma/engines": true
  "@prisma/client": true
  prisma: true
  sharp: true
  # @sentry/cli's postinstall downloads the Sentry CLI binary used at
  # build time (apps/web only) to upload source maps. The binary is
  # not used at runtime. Approving it here so the install completes
  # without manual intervention on every clone.
  "@sentry/cli": true
  # @clerk/shared runs a postinstall to wire the Clerk SDK; safe to
  # approve. protobufjs is a transitive dep of @sentry/cli's source-map
  # upload pipeline and also needs build approval.
  "@clerk/shared": true
  protobufjs: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pharmax}
    ports:
      - "5432:5432"
    volumes:
      - pharmax_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pharmax}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pharmax-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - pharmax_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pharmax-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pharmax_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pharmax_minio_dev}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pharmax_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: pharmax-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pharmax_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pharmax_minio_dev}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-pharmax-dev}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET_NAME &&
      mc anonymous set none local/$$S3_BUCKET_NAME &&
      echo 'minio bucket ready: '$$S3_BUCKET_NAME
      "
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pharmax-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pharmax-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@pharmax.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pharmax_dev}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pharmax_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pharmax_postgres_data:
  pharmax_redis_data:
  pharmax_minio_data:
  pharmax_pgadmin_data:
